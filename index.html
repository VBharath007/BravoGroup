<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/assets/logo.jpeg" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020c1b" />
  <meta name="description"
    content="Zenova Groups - MBBS Abroad Admissions | Study Medicine in Russia, Georgia, Kyrgyzstan, Uzbekistan" />
  <link rel="apple-touch-icon" href="/assets/logo.jpeg" />
  <link rel="manifest" href="/manifest.json" />

  <!-- 
    25+ Years Experience Architecture Note:
    Self-hosting fonts eliminates 3rd-party dependencies, improves LCP, 
    and ensures GDPR compliance. All fonts are served from /public/fonts/
  -->
  <style>
    /* Critical Font Face Definitions - Inlined for Zero FOUT */
    @font-face {
      font-family: 'Inter';
      src: url('/fonts/Inter-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
      font-style: normal;
    }

    @font-face {
      font-family: 'Playfair Display';
      src: url('/fonts/PlayfairDisplay-Variable.woff2') format('woff2-variations');
      font-weight: 400 900;
      font-display: swap;
      font-style: italic normal;
    }

    @font-face {
      font-family: 'Outfit';
      src: url('/fonts/Outfit-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>

  <!-- Optimized Local Vendor Assets -->
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" />

  <!-- Hardened Security Policy (No external font/script domains required) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; 
    worker-src 'self' blob:; 
    child-src 'self' blob:; 
    style-src 'self' 'unsafe-inline'; 
    font-src 'self'; 
    img-src 'self' data: https: blob:; 
    connect-src 'self' https: wss: blob:; 
    media-src 'self' https:; 
    frame-src 'self' https://www.google.com https://maps.google.com https://www.youtube.com;
    object-src 'none';
  ">

  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <title>Zenova Groups | Premier Educational ConsultancyMedical Education</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- Vite Entry -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
