<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <link rel="icon" href="/favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020c1b" />
  <meta name="description"
    content="Bravo Groups - MBBS Abroad Admissions | Study Medicine in Russia, Georgia, Kyrgyzstan, Uzbekistan" />
  <link rel="apple-touch-icon" href="/logo192.png" />
  <link rel="manifest" href="/manifest.json" />

  <!-- 
    LCP Optimization: Preload critical assets to eliminate Resource Load Delay.
    Prioritize the first hero animation frame and 3D Spline assets.
  -->
  <link rel="preload" as="image" href="/frameinjection/video_in_001.webp" fetchpriority="high" />
  <link rel="preload" as="image" href="/assets/bgremovedlogo-small.webp" fetchpriority="high" />
  
  <link rel="preload" href="/fonts/Inter-Variable.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
  <link rel="preload" href="/fonts/Outfit-Variable.woff2" as="font" type="font/woff2" crossorigin="anonymous" />

  <!-- Preload Critical Spline Assets for Countries and Universities pages -->
  <link rel="preload" href="/assets/earth.splinecode" as="fetch" crossorigin="anonymous" />
  <link rel="preload" href="/assets/universities.splinecode" as="fetch" crossorigin="anonymous" />

  <style>
    /* Critical Font Face Definitions - Inlined for Zero FOUT */
    @font-face {
      font-family: 'Inter';
      src: url('/fonts/Inter-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
      font-style: normal;
    }

    @font-face {
      font-family: 'Playfair Display';
      src: url('/fonts/PlayfairDisplay-Variable.woff2') format('woff2-variations');
      font-weight: 400 900;
      font-display: swap;
      font-style: italic normal;
    }

    @font-face {
      font-family: 'Outfit';
      src: url('/fonts/Outfit-Variable.woff2') format('woff2-variations');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>

  <!-- Optimized Local Vendor Assets -->
  <!-- Defer non-critical CSS to eliminate render-blocking delay -->
  <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" media="print" onload="this.media='all'" />
  <noscript><link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css" /></noscript>

  <!-- Hardened Security Policy (No external font/script domains required) -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self'; 
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; 
    worker-src 'self' blob:; 
    child-src 'self' blob:; 
    style-src 'self' 'unsafe-inline'; 
    font-src 'self'; 
    img-src 'self' data: https: blob:; 
    connect-src 'self' https: wss: blob:; 
    media-src 'self' https:; 
    object-src 'none';
  ">

  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />

  <title>Bravo Groups | Premier Educational Consultancy Medical Education</title>
</head>

<body>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="root"></div>
  <!-- Vite Entry -->
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
